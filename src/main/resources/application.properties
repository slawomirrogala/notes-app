spring.application.name=betacom

spring.datasource.url=jdbc:mysql://localhost:3306/notes_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
